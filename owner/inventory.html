<!DOCTYPE html>
<html lang="en-PH" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Inventory — PrintRUSH Lopez</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
        }

        .owner-layout-root {
            display: flex;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div class="cmyk-bg" aria-hidden="true" style="opacity:.3;"></div>
    <div class="owner-layout-root"></div>
    <script>
        const r = document.documentElement;
        const s = localStorage.getItem('printrush-theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
        r.setAttribute('data-theme', s);
    </script>
    <script type="module" src="/js/owner/inventory.js"></script>
    <script>window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });</script>
</body>

</html>
